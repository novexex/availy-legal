# Created by Artur Ilyasov

name: Availy support request
description: Ask for help with Availy.
title: "[Support] "
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the issue or question.
    validations:
      required: true
  - type: input
    id: ios-version
    attributes:
      label: iOS version
      placeholder: "Example: iOS 18.5"
  - type: input
    id: app-version
    attributes:
      label: Availy version
      placeholder: "Example: 1.0"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps if this is a bug report.
  - type: textarea
    id: extra
    attributes:
      label: Additional details
      description: Add screenshots, logs, or context if relevant.

