<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Availy Support and Legal</title>
  <meta name="description" content="Choose a language for Availy support and privacy policy pages.">
  <link rel="stylesheet" href="./assets/styles.css">
  <link rel="alternate" hreflang="en" href="./en/">
  <link rel="alternate" hreflang="ru" href="./ru/">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./" aria-label="Availy legal home">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>Availy</span>
    </a>
  </header>

  <main>
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Support and legal</p>
        <h1>Choose your language.</h1>
        <p>
          Select a language to open Availy support and privacy policy pages.
        </p>
      </div>

      <div class="availability-preview" aria-hidden="true">
        <div class="preview-header">
          <span>Today</span>
          <strong>Free now</strong>
        </div>
        <div class="timeline">
          <span class="time">8</span>
          <span class="busy work"></span>
          <span class="free"></span>
          <span class="busy meal"></span>
          <span class="free wide"></span>
          <span class="busy close"></span>
          <span class="time">22</span>
        </div>
      </div>
    </section>

    <section class="language-grid" aria-label="Languages">
      <a class="language-card" href="./en/">
        <strong>English</strong>
        <span>Support and Privacy Policy</span>
      </a>

      <a class="language-card" href="./ru/" lang="ru">
        <strong>Русский</strong>
        <span>Поддержка и Политика конфиденциальности</span>
      </a>
    </section>
  </main>

  <footer class="site-footer">
    <span>Availy</span>
    <span>Last updated June 9, 2026</span>
  </footer>
</body>
</html>
